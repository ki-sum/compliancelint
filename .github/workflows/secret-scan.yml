name: secret-scan

# Daily + on-push gitleaks scan of public repo. Public repo's risk
# surface is smaller (BSL 1.1 source-available, no .env.production)
# but the same protective net is cheap to add — better than an
# unnoticed credential ending up in a release commit.
# Sister workflow lives in the private repo at the same path.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source=. --redact --no-banner
