name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'scanner/**'
  pull_request:
    branches: [master]

jobs:
  # ── Scanner (Python) ──────────────────────────────────
  scanner-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: scanner
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      # --ignore=tests/e2e: cross-system flows, see CI_MATRIX_BUGS.md BUG-CI-1
      - run: python -m pytest -x --tb=short --ignore=tests/e2e
