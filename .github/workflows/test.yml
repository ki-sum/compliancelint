name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'scanner/**'
      - '.github/workflows/test.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── Scanner (Python) ──────────────────────────────────
  # README claims "Cross-OS CI matrix (Ubuntu, macOS, Windows ×
  # Python 3.10–3.13)". §Y deeper-pass 2026-05-03 found we were only
  # running 3.12. Expanded to honor the README claim. Total = 4 ×
  # 3 = 12 jobs. Source code grep'd 0 Python 3.11+ specific features
  # (ExceptionGroup / except* / asyncio.TaskGroup / tomllib) so 3.10
  # support is structurally sound.
  scanner-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install from root pyproject.toml — there is no separate
      # scanner/requirements.txt; deps live at the project root in
      # pyproject.toml [project] `dependencies`. The prior workflow used
      # `working-directory: scanner` + `pip install -r requirements.txt`
      # which broke when the file was never created (failing since at
      # least 2026-04-30 per gh run history). Now installs the package
      # editable + pytest-only test deps explicitly.
      - run: pip install -e . pytest pytest-timeout pytest-asyncio
      # --ignore=tests/e2e: cross-system flows requiring deployed dashboard
      # --ignore=tests/pool4: Pool 4 cross-system real-flow tests are
      #   private-repo territory (gated by POOL4_CELLS_DIR + dashboard
      #   dev server on :3000). The cell_loader.py module-level
      #   `import yaml` would fail at pytest collection on PUBLIC CI
      #   where pyyaml is not a declared dep, blocking ALL scanner tests.
      # Run from project root so scanner/tests/ resolves cleanly.
      # -m "not network": tests that need SaaS reachability + valid api_key
      # (e.g. cl_action_guide returning human_judgment_needed which lives
      # SaaS-side per §AA Option C 2026-05-02). Run via `pytest -m network`
      # locally against a live dashboard before publishing a scanner release.
      - run: python -m pytest scanner/tests/ -x --tb=short --ignore=scanner/tests/e2e --ignore=scanner/tests/pool4 -m "not network"
